worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Zona de rate limit: 10 req/seg por IP, con margen de ráfaga
    limit_req_zone $binary_remote_addr zone=zocoia_api:10m rate=10r/s;

    # --- Redirección HTTP -> HTTPS ---
    server {
        listen 80;
        server_name zocoia.com www.zocoia.com;

        # Necesario para renovar certificados con certbot en modo webroot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS ---
    server {
        listen 443 ssl;
        server_name zocoia.com www.zocoia.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10m;

        location / {
            limit_req zone=zocoia_api burst=20 nodelay;

            proxy_pass http://gateway:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Los modelos tardan en responder: no cortar la conexión pronto
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
