version: "3.9"

services:

  vllm:
    image: vllm/vllm-openai:latest
    container_name: zocoia-vllm
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./vllm/models:/root/.cache/huggingface
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      --model Qwen/Qwen2.5-Coder-32B-Instruct
      --host 0.0.0.0
      --port 8000
      --max-model-len 16384
      --gpu-memory-utilization 0.90
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  gateway:
    build: ./gateway
    container_name: zocoia-gateway
    restart: unless-stopped
    depends_on:
      - vllm
    environment:
      - VLLM_URL=http://vllm:8000/v1
      - PORT=4000
      - DB_PATH=/data/gateway.db
    volumes:
      - ./gateway/data:/data
    ports:
      - "127.0.0.1:4000:4000"

  nginx:
    image: nginx:alpine
    container_name: zocoia-nginx
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"

  agent-sandbox:
    build: ./agent
    container_name: zocoia-agent-sandbox
    restart: "no"
    depends_on:
      - gateway
    environment:
      - GATEWAY_URL=http://gateway:4000/v1
      - GATEWAY_API_KEY=${AGENT_INTERNAL_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agent/workspace:/workspace
